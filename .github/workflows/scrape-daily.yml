name: Daily GPU Price Scrape

on:
  schedule:
    # 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      gpu_filter:
        description: "GPU family filter (leave empty for H100 + A100)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT if you need to push back to a protected branch;
          # GITHUB_TOKEN is enough for unprotected main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialise databases
        run: |
          python3 -m gpu_scraper.cli init-db
          python3 -c "
          from gpu_scraper.storage import HistoryDatabase
          hdb = HistoryDatabase('data/pricing_history.db')
          hdb.init()
          print('History DB ready, rows:', hdb.row_count())
          "

      - name: Fetch GPU prices
        env:
          LAMBDA_API_KEY: ${{ secrets.LAMBDA_API_KEY }}
        run: |
          GPU_ARG=""
          if [ -n "${{ github.event.inputs.gpu_filter }}" ]; then
            GPU_ARG="--gpu ${{ github.event.inputs.gpu_filter }}"
          fi
          python3 -m gpu_scraper.cli fetch --no-filter --save-db $GPU_ARG
          echo "Snapshot rows: $(python3 -c "from gpu_scraper.storage import HistoryDatabase; print(HistoryDatabase('data/pricing_history.db').row_count())")"

      - name: Generate GitHub Pages dashboard
        run: python3 scripts/generate_dashboard.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/pricing_history.db docs/index.html docs/data.json docs/.nojekyll

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore(data): daily snapshot ${DATE}

          Automated scrape by github-actions[bot].
          Dashboard: https://${{ github.repository_owner }}.github.io/$(echo ${{ github.repository }} | cut -d/ -f2)/"
            git push origin HEAD
          fi
