name: Daily GPU Price Scrape

on:
  schedule:
    # Off-peak schedule to minimize GitHub Actions queue delay (avoid round hours)
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      gpu_filter:
        description: "GPU family filter (leave empty for all GPUs)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialise databases
        run: |
          python3 -m gpu_scraper.cli init-db
          python3 -c "
          from gpu_scraper.storage import HistoryDatabase
          hdb = HistoryDatabase('data/pricing_history.db')
          hdb.init()
          print('History DB ready, rows:', hdb.row_count())
          "

      - name: Fetch GPU prices
        env:
          LAMBDA_API_KEY: ${{ secrets.LAMBDA_API_KEY }}
        run: |
          GPU_ARG=""
          if [ -n "${{ github.event.inputs.gpu_filter }}" ]; then
            GPU_ARG="--gpu ${{ github.event.inputs.gpu_filter }}"
          fi
          echo "=== data/ before fetch ==="
          ls -lh data/ 2>/dev/null || echo "(data/ not found)"
          # Errors and empty-provider warnings are now printed to stderr (always visible).
          python3 -m gpu_scraper.cli fetch --no-filter --save-db $GPU_ARG
          echo "=== data/ after fetch ==="
          ls -lh data/ 2>/dev/null || echo "(data/ not found)"
          # Diagnostic: report the latest scrape run — non-fatal so a bad DB never
          # blocks the snapshot step that has its own validation.
          python3 - <<'PYEOF' || true
          import sqlite3, sys
          try:
              con = sqlite3.connect('data/gpu_prices.db')
              tables = [r[0] for r in con.execute("SELECT name FROM sqlite_master WHERE type='table'").fetchall()]
              print(f"gpu_prices.db tables: {tables}")
              if 'scrape_runs' in tables:
                  run = con.execute("SELECT id, total_offers FROM scrape_runs ORDER BY started_at DESC LIMIT 1").fetchone()
                  if run:
                      print(f"Latest run {run[0][:8]}: {run[1]} observations")
                  else:
                      print("scrape_runs table exists but is empty")
              con.close()
          except Exception as e:
              print(f"WARNING: could not inspect gpu_prices.db: {e}", file=sys.stderr)
          PYEOF

      - name: Save daily snapshot to price history
        # This step is the authoritative writer for pricing_history.db.
        # It reads directly from gpu_prices.db (populated by the fetch step above)
        # and writes to pricing_history.db with an explicit WAL checkpoint so that
        # git add picks up the changes (WAL pages live outside the main .db file
        # until checkpointed, which means git would otherwise miss them).
        run: |
          python3 - <<'PYEOF'
          import sqlite3, sys
          from datetime import datetime, timezone
          from gpu_scraper.storage import HistoryDatabase

          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          print(f'Saving snapshot for {today}')

          hdb = HistoryDatabase('data/pricing_history.db')
          hdb.init()
          try:
              count = hdb.save_snapshot_from_observations('data/gpu_prices.db', today)
              print(f'Snapshot saved: {count} rows for {today}')
          except RuntimeError as e:
              print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Validate snapshot row count
        run: |
          ROWS_TODAY=$(sqlite3 data/pricing_history.db \
            "SELECT COUNT(*) FROM price_history WHERE snapshot_date = date('now');")
          if [ "$ROWS_TODAY" -eq 0 ]; then
            echo "::error::No rows inserted for today's snapshot — check provider errors above"
            exit 1
          fi
          echo "✓ $ROWS_TODAY rows for $(date -u +%Y-%m-%d) in price_history"

      - name: Generate GitHub Pages dashboard
        run: python3 scripts/generate_dashboard.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/pricing_history.db docs/index.html docs/data.json docs/.nojekyll

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore(data): daily snapshot ${DATE}

          Automated scrape by github-actions[bot].
          Dashboard: https://${{ github.repository_owner }}.github.io/$(echo ${{ github.repository }} | cut -d/ -f2)/"
            git push origin HEAD
          fi
